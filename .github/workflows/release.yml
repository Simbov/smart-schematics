name: Release

# Builds native installers for macOS + Windows and attaches them to a
# GitHub Release whenever you push a version tag like `v0.0.1`.
#
#   git tag v0.0.1 && git push origin v0.0.1
#
# You can also trigger it manually from the Actions tab (workflow_dispatch).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Needed so the workflow can create/upload the GitHub Release.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Universal binary covers both Apple Silicon and Intel Macs.
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: smart-schematics/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "smart-schematics/src-tauri -> target"

      - name: Install frontend dependencies
        working-directory: smart-schematics
        run: npm ci

      - name: Extract release notes from CHANGELOG
        id: changelog
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Capture the lines under "## [VERSION]" up to the next "## [" heading.
          NOTES=$(awk -v hdr="## [$VERSION]" '
            index($0, hdr) == 1 { capture = 1; next }
            /^## \[/ { capture = 0 }
            capture { print }
          ' CHANGELOG.md)
          {
            echo "notes<<CHANGELOG_EOF"
            echo "$NOTES"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build app + create Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — required so tauri-action produces signed bundles
          # and a latest.json manifest. Add these in repo Settings → Secrets.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: smart-schematics
          tagName: ${{ github.ref_name }}
          releaseName: "Smart Schematics ${{ github.ref_name }}"
          releaseBody: |
            ${{ steps.changelog.outputs.notes }}

            ---

            Native installers for macOS and Windows are attached below.

            **macOS (.dmg):** the app is unsigned, so on first launch
            right-click the app → **Open** → **Open**. (Or run
            `xattr -cr "/Applications/Smart Schematics.app"` once.)

            **Windows (.msi/.exe):** SmartScreen may warn — click
            **More info** → **Run anyway**.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # Flip the draft to published only after BOTH platform builds have finished
  # uploading, so users' auto-updater never sees a half-populated release.
  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --draft=false --latest
